<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>記憶遊戲</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: Arial, sans-serif;
    background: #f3f4f6;
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: fixed;
    top: 0;
    left: 0;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .phase { display: none; flex-direction: column; align-items: center; width: 100%; padding: 24px; }
  .phase.active { display: flex; }
  .label {
    font-size: 2.5em;
    color: #374151;
    margin-bottom: 24px;
  }
  .big-number {
    font-size: 14em;
    font-weight: bold;
    margin-bottom: 40px;
    line-height: 1;
    color: #1e3a5f;
  }

  .btn {
    border: none;
    border-radius: 20px;
    padding: 28px 50px;
    font-size: 1.8em;
    color: white;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    top: 0;
    transition: all 0.05s ease;
    text-shadow: 0 2px 2px rgba(0,0,0,0.2);
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active, .btn.pressed {
    top: 6px;
    box-shadow: none !important;
  }

  .btn-blue {
    background: linear-gradient(to bottom, #60a5fa, #2563eb);
    box-shadow: 0 8px 0 #1d4ed8, 0 12px 16px rgba(0,0,0,0.2);
  }
  .btn-blue:hover {
    background: linear-gradient(to bottom, #93bbfd, #3b82f6);
  }
  .btn-blue:active, .btn-blue.pressed {
    background: linear-gradient(to bottom, #3b82f6, #2563eb);
    box-shadow: 0 2px 0 #1d4ed8;
  }

  .btn-green {
    background: linear-gradient(to bottom, #4ade80, #16a34a);
    box-shadow: 0 8px 0 #15803d, 0 12px 16px rgba(0,0,0,0.2);
  }
  .btn-green:hover {
    background: linear-gradient(to bottom, #86efac, #22c55e);
  }
  .btn-green:active, .btn-green.pressed {
    background: linear-gradient(to bottom, #22c55e, #16a34a);
    box-shadow: 0 2px 0 #15803d;
  }

  .btn span.sub {
    font-size: 0.65em;
    margin-top: 6px;
    opacity: 0.85;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    max-width: 420px;
  }
  .choice-btn {
    background: linear-gradient(to bottom, #ffffff, #e5e7eb);
    border: none;
    border-radius: 20px;
    padding: 28px 30px;
    display: flex;
    align-items: center;
    gap: 24px;
    cursor: pointer;
    font-size: 1em;
    position: relative;
    top: 0;
    box-shadow: 0 8px 0 #9ca3af, 0 12px 16px rgba(0,0,0,0.15);
    transition: all 0.05s ease;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .choice-btn:hover {
    background: linear-gradient(to bottom, #eff6ff, #bfdbfe);
    box-shadow: 0 8px 0 #60a5fa, 0 12px 16px rgba(0,0,0,0.15);
  }
  .choice-btn:active, .choice-btn.pressed {
    top: 6px;
    box-shadow: 0 2px 0 #9ca3af;
    background: linear-gradient(to bottom, #e5e7eb, #d1d5db);
  }

  .choice-number {
    font-size: 5em;
    font-weight: bold;
    line-height: 1;
    color: #1e3a5f;
  }
  .choice-text {
    font-size: 1.6em;
    color: #6b7280;
    font-weight: bold;
  }

  .result-text {
    font-size: 3em;
    margin-bottom: 40px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="look" class="phase">
  <p class="label">睇吓呢個數字：</p>
  <div id="showNumber" class="big-number"></div>
  <button class="btn btn-blue" id="readyBtn">
    <span>👆 記住咗就撳呢度</span>
    <span class="sub">個數字會消失㗎！</span>
  </button>
</div>

<div id="guess" class="phase">
  <p class="label">請撳你見過嘅數字</p>
  <div id="choicesContainer" class="choices"></div>
</div>

<div id="result" class="phase">
  <p id="resultText" class="result-text"></p>
  <button class="btn btn-green" id="againBtn">
    <span>👆 撳呢度再玩</span>
    <span class="sub">會出新數字㗎！</span>
  </button>
</div>

<script>
  // Prevent all scrolling
  document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
  document.addEventListener('scroll', function(e) { e.preventDefault(); }, { passive: false });

  let answer = null;
  let choices = [];

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function pickChoices(correct) {
    const all = [1, 2, 3, 4, 5];
    const others = all.filter(n => n !== correct);
    const picked = shuffle(others).slice(0, 2);
    picked.push(correct);
    return shuffle(picked);
  }

  function showPhase(id) {
    document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function newRound() {
    answer = Math.floor(Math.random() * 5) + 1;
    choices = pickChoices(answer);
    document.getElementById('showNumber').textContent = answer;
    showPhase('look');
  }

  function goGuess() {
    const container = document.getElementById('choicesContainer');
    container.innerHTML = '';

    choices.forEach(num => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML =
        '<span class="choice-number">' + num + '</span>' +
        '<span class="choice-text">👈 撳呢個</span>';

      btn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        btn.classList.add('pressed');
        checkAnswer(num);
      }, { passive: false });

      btn.addEventListener('touchend', function() {
        btn.classList.remove('pressed');
      });

      btn.addEventListener('click', function() {
        checkAnswer(num);
      });

      container.appendChild(btn);
    });

    showPhase('guess');
  }

  function checkAnswer(num) {
    const resultText = document.getElementById('resultText');
    if (num === answer) {
      resultText.textContent = '✅ 答對了！好叻！';
    } else {
      resultText.textContent = '❌ 唔啱呀，再試吓！';
    }
    showPhase('result');
  }

  // Fast touch handling for main buttons
  function addFastTouch(el, callback) {
    el.addEventListener('touchstart', function(e) {
      e.preventDefault();
      el.classList.add('pressed');
      callback();
    }, { passive: false });

    el.addEventListener('touchend', function() {
      el.classList.remove('pressed');
    });

    el.addEventListener('click', callback);
  }

  addFastTouch(document.getElementById('readyBtn'), goGuess);
  addFastTouch(document.getElementById('againBtn'), newRound);

  newRound();
</script>

</body>
</html>
