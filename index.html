<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>記憶遊戲</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: Arial, sans-serif;
    background: #f3f4f6;
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: fixed;
    top: 0;
    left: 0;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .phase { display: none; flex-direction: column; align-items: center; width: 100%; padding: 24px; }
  .phase.active { display: flex; }
  .label {
    font-size: 2.5em;
    color: #374151;
    margin-bottom: 24px;
  }
  .big-number {
    font-size: 14em;
    font-weight: bold;
    margin-bottom: 40px;
    line-height: 1;
    color: #1e3a5f;
  }

  .btn {
    border: none;
    border-radius: 20px;
    padding: 28px 50px;
    font-size: 1.8em;
    color: white;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    top: 0;
    transition: all 0.05s ease;
    text-shadow: 0 2px 2px rgba(0,0,0,0.2);
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active, .btn.pressed {
    top: 6px;
    box-shadow: none !important;
  }

  .btn-blue {
    background: linear-gradient(to bottom, #60a5fa, #2563eb);
    box-shadow: 0 8px 0 #1d4ed8, 0 12px 16px rgba(0,0,0,0.2);
  }
  .btn-blue:hover {
    background: linear-gradient(to bottom, #93bbfd, #3b82f6);
  }
  .btn-blue:active, .btn-blue.pressed {
    background: linear-gradient(to bottom, #3b82f6, #2563eb);
    box-shadow: 0 2px 0 #1d4ed8;
  }

  .btn-green {
    background: linear-gradient(to bottom, #4ade80, #16a34a);
    box-shadow: 0 8px 0 #15803d, 0 12px 16px rgba(0,0,0,0.2);
  }
  .btn-green:hover {
    background: linear-gradient(to bottom, #86efac, #22c55e);
  }
  .btn-green:active, .btn-green.pressed {
    background: linear-gradient(to bottom, #22c55e, #16a34a);
    box-shadow: 0 2px 0 #15803d;
  }

  .btn span.sub {
    font-size: 0.65em;
    margin-top: 6px;
    opacity: 0.85;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    max-width: 420px;
  }
  .choice-btn {
    background: linear-gradient(to bottom, #ffffff, #e5e7eb);
    border: none;
    border-radius: 20px;
    padding: 28px 30px;
    display: flex;
    align-items: center;
    gap: 24px;
    cursor: pointer;
    font-size: 1em;
    position: relative;
    top: 0;
    box-shadow: 0 8px 0 #9ca3af, 0 12px 16px rgba(0,0,0,0.15);
    transition: all 0.05s ease;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .choice-btn:hover {
    background: linear-gradient(to bottom, #eff6ff, #bfdbfe);
    box-shadow: 0 8px 0 #60a5fa, 0 12px 16px rgba(0,0,0,0.15);
  }
  .choice-btn:active, .choice-btn.pressed {
    top: 6px;
    box-shadow: 0 2px 0 #9ca3af;
    background: linear-gradient(to bottom, #e5e7eb, #d1d5db);
  }

  .choice-number {
    font-size: 5em;
    font-weight: bold;
    line-height: 1;
    color: #1e3a5f;
  }
  .choice-text {
    font-size: 1.6em;
    color: #6b7280;
    font-weight: bold;
  }

  .result-text {
    font-size: 3em;
    margin-bottom: 40px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="look" class="phase">
  <p class="label">睇吓呢個數字：</p>
  <div id="showNumber" class="big-number"></div>
  <button class="btn btn-blue" id="readyBtn">
    <span>👆 記住咗就撳呢度</span>
    <span class="sub">個數字會消失㗎！</span>
  </button>
</div>

<div id="guess" class="phase">
  <p class="label">請撳你見過嘅數字</p>
  <div id="choicesContainer" class="choices"></div>
</div>

<div id="result" class="phase">
  <p id="resultText" class="result-text"></p>
  <button class="btn btn-green" id="againBtn">
    <span>👆 撳呢度再玩</span>
    <span class="sub">會出新數字㗎！</span>
  </button>
</div>

<script>
  document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
  document.addEventListener('scroll', function(e) { e.preventDefault(); }, { passive: false });

  let answer = null;
  let choices = [];
  let speechUnlocked = false;
  let femaleVoice = null;

  // iOS requires speech to be triggered directly from a user gesture first
  function unlockSpeech() {
    if (speechUnlocked) return;
    if ('speechSynthesis' in window) {
      const warmup = new SpeechSynthesisUtterance(' ');
      warmup.volume = 0.01;
      warmup.rate = 10;
      window.speechSynthesis.speak(warmup);
      speechUnlocked = true;
    }
  }

  function loadVoices() {
    if (!('speechSynthesis' in window)) return;
    const voices = window.speechSynthesis.getVoices();
    if (voices.length === 0) return;

    const femaleNames = ['samantha', 'karen', 'victoria', 'fiona', 'moira', 'tessa', 'kate', 'susan', 'zira', 'hazel', 'female'];
    const enVoices = voices.filter(function(v) { return v.lang.startsWith('en'); });

    for (var i = 0; i < enVoices.length; i++) {
      var name = enVoices[i].name.toLowerCase();
      for (var j = 0; j < femaleNames.length; j++) {
        if (name.indexOf(femaleNames[j]) !== -1) {
          femaleVoice = enVoices[i];
          return;
        }
      }
    }

    if (!femaleVoice && enVoices.length > 0) {
      femaleVoice = enVoices[0];
    }
  }

  if ('speechSynthesis' in window) {
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }

  function sayGood() {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();

    // Small delay after cancel to let iOS process it
    setTimeout(function() {
      var utterance = new SpeechSynthesisUtterance('Good!');
      utterance.lang = 'en-US';
      utterance.rate = 1.05;
      utterance.pitch = 1.6;
      utterance.volume = 1;
      if (femaleVoice) {
        utterance.voice = femaleVoice;
      }
      window.speechSynthesis.speak(utterance);
    }, 50);
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var temp = a[i];
      a[i] = a[j];
      a[j] = temp;
    }
    return a;
  }

  function pickChoices(correct) {
    var all = [1, 2, 3, 4, 5];
    var others = all.filter(function(n) { return n !== correct; });
    var picked = shuffle(others).slice(0, 2);
    picked.push(correct);
    return shuffle(picked);
  }

  function showPhase(id) {
    document.querySelectorAll('.phase').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
  }

  function newRound() {
    answer = Math.floor(Math.random() * 5) + 1;
    choices = pickChoices(answer);
    document.getElementById('showNumber').textContent = answer;
    showPhase('look');
  }

  function goGuess() {
    var container = document.getElementById('choicesContainer');
    container.innerHTML = '';

    choices.forEach(function(num) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML =
        '<span class="choice-number">' + num + '</span>' +
        '<span class="choice-text">👈 撳呢個</span>';

      btn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        btn.classList.add('pressed');
        checkAnswer(num);
      }, { passive: false });

      btn.addEventListener('touchend', function() {
        btn.classList.remove('pressed');
      });

      btn.addEventListener('click', function() {
        checkAnswer(num);
      });

      container.appendChild(btn);
    });

    showPhase('guess');
  }

  function checkAnswer(num) {
    var resultText = document.getElementById('resultText');
    if (num === answer) {
      resultText.textContent = '✅ 答對了！好叻！';
      sayGood();
    } else {
      resultText.textContent = '❌ 唔啱呀，再試吓！';
    }
    showPhase('result');
  }

  function addFastTouch(el, callback) {
    el.addEventListener('touchstart', function(e) {
      e.preventDefault();
      el.classList.add('pressed');
      unlockSpeech();
      callback();
    }, { passive: false });

    el.addEventListener('touchend', function() {
      el.classList.remove('pressed');
    });

    el.addEventListener('click', function() {
      unlockSpeech();
      callback();
    });
  }

  addFastTouch(document.getElementById('readyBtn'), goGuess);
  addFastTouch(document.getElementById('againBtn'), newRound);

  newRound();
</script>

</body>
</html>
