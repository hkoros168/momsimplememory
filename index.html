<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>記憶遊戲</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
    background: #f3f4f6;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .phase {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 700px;
    padding: 24px;
    text-align: center;
  }

  .phase.active {
    display: flex;
  }

  .label {
    font-size: 2.4em;
    color: #374151;
    margin-bottom: 24px;
  }

  .big-number {
    font-size: 12em;
    font-weight: bold;
    line-height: 1;
    color: #1e3a5f;
    margin-bottom: 36px;
  }

  .big-icon {
    font-size: 7em;
    line-height: 1;
    margin-bottom: 24px;
  }

  .btn,
  .choice-btn {
    border: none;
    border-radius: 20px;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-appearance: none;
    appearance: none;
  }

  .btn {
    color: white;
    font-size: 1.8em;
    padding: 28px 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-shadow: 0 2px 2px rgba(0,0,0,0.2);
    transition: transform 0.05s ease, box-shadow 0.05s ease;
  }

  .btn:active {
    transform: translateY(4px);
  }

  .btn-orange {
    background: linear-gradient(to bottom, #fb923c, #ea580c);
    box-shadow: 0 8px 0 #c2410c, 0 12px 16px rgba(0,0,0,0.2);
  }

  .btn-orange:active {
    box-shadow: 0 3px 0 #c2410c, 0 6px 10px rgba(0,0,0,0.18);
  }

  .btn-blue {
    background: linear-gradient(to bottom, #60a5fa, #2563eb);
    box-shadow: 0 8px 0 #1d4ed8, 0 12px 16px rgba(0,0,0,0.2);
  }

  .btn-blue:active {
    box-shadow: 0 3px 0 #1d4ed8, 0 6px 10px rgba(0,0,0,0.18);
  }

  .btn-green {
    background: linear-gradient(to bottom, #4ade80, #16a34a);
    box-shadow: 0 8px 0 #15803d, 0 12px 16px rgba(0,0,0,0.2);
  }

  .btn-green:active {
    box-shadow: 0 3px 0 #15803d, 0 6px 10px rgba(0,0,0,0.18);
  }

  .btn span.sub {
    font-size: 0.65em;
    margin-top: 6px;
    opacity: 0.85;
  }

  .choices {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .choice-btn {
    width: 100%;
    background: linear-gradient(to bottom, #ffffff, #e5e7eb);
    box-shadow: 0 8px 0 #9ca3af, 0 12px 16px rgba(0,0,0,0.15);
    padding: 26px 28px;
    display: flex;
    align-items: center;
    gap: 22px;
    transition: transform 0.05s ease, box-shadow 0.05s ease;
  }

  .choice-btn:active {
    transform: translateY(4px);
    box-shadow: 0 3px 0 #9ca3af, 0 6px 10px rgba(0,0,0,0.12);
  }

  .choice-number {
    font-size: 4.8em;
    font-weight: bold;
    line-height: 1;
    color: #1e3a5f;
  }

  .choice-text {
    font-size: 1.5em;
    font-weight: bold;
    color: #6b7280;
  }

  .result-text {
    font-size: 3em;
    margin-bottom: 40px;
  }

  .sound-status {
    min-height: 1.6em;
    margin-top: 18px;
    font-size: 1.2em;
    color: #6b7280;
  }

  @media (max-width: 768px) {
    .label { font-size: 2em; }
    .big-number { font-size: 9em; }
    .big-icon { font-size: 6em; }
    .btn { font-size: 1.5em; padding: 24px 32px; }
    .choice-number { font-size: 4em; }
    .choice-text { font-size: 1.3em; }
    .result-text { font-size: 2.4em; }
  }
</style>
</head>
<body>

<div id="start" class="phase active">
  <div class="big-icon">🔊</div>
  <p class="label">記憶數字遊戲</p>
  <button class="btn btn-orange" id="soundBtn" type="button">
    <span>👆 撳呢度開聲</span>
    <span class="sub">開咗聲先可以玩！</span>
  </button>
  <p id="soundStatus" class="sound-status"></p>
</div>

<div id="look" class="phase">
  <p class="label">睇吓呢個數字：</p>
  <div id="showNumber" class="big-number"></div>
  <button class="btn btn-blue" id="readyBtn" type="button">
    <span>👆 記住咗就撳呢度</span>
    <span class="sub">個數字會消失㗎！</span>
  </button>
</div>

<div id="guess" class="phase">
  <p class="label">請撳你見過嘅數字</p>
  <div id="choicesContainer" class="choices"></div>
</div>

<div id="result" class="phase">
  <p id="resultText" class="result-text"></p>
  <button class="btn btn-green" id="againBtn" type="button">
    <span>👆 撳呢度再玩</span>
    <span class="sub">會出新數字㗎！</span>
  </button>
</div>

<script>
  var answer = null;
  var choices = [];
  var audioCtx = null;
  var soundUnlocked = false;
  var busy = false;

  function showPhase(id) {
    document.querySelectorAll('.phase').forEach(function(el) {
      el.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var temp = a[i];
      a[i] = a[j];
      a[j] = temp;
    }
    return a;
  }

  function pickChoices(correct) {
    var all = [1, 2, 3, 4, 5];
    var others = all.filter(function(n) { return n !== correct; });
    var picked = shuffle(others).slice(0, 2);
    picked.push(correct);
    return shuffle(picked);
  }

  function initAudio() {
    if (!audioCtx) {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) throw new Error('Web Audio not supported');
      audioCtx = new Ctx();
    }
    return audioCtx.resume();
  }

  function simpleBeep(freq, duration, volume, type, when) {
    if (!audioCtx) return;
    var t = when || audioCtx.currentTime;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();

    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t);

    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.linearRampToValueAtTime(volume, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(t);
    osc.stop(t + duration + 0.03);
  }

  function unlockAndStart() {
    if (busy) return;
    busy = true;

    var status = document.getElementById('soundStatus');
    status.textContent = '開聲中...';

    initAudio().then(function() {
      soundUnlocked = true;

      var now = audioCtx.currentTime + 0.02;
      simpleBeep(880, 0.18, 0.18, 'sine', now);
      simpleBeep(1320, 0.18, 0.12, 'sine', now + 0.08);

      status.textContent = '✅ 已開聲';

      setTimeout(function() {
        busy = false;
        newRound();
      }, 350);
    }).catch(function(err) {
      console.log(err);
      status.textContent = '⚠️ 開聲失敗，請再撳一次';
      busy = false;
    });
  }

  function playCorrectSound() {
    if (!soundUnlocked || !audioCtx) return;

    audioCtx.resume().then(function() {
      var now = audioCtx.currentTime + 0.01;
      simpleBeep(523.25, 0.22, 0.18, 'sine', now);
      simpleBeep(659.25, 0.22, 0.18, 'sine', now + 0.10);
      simpleBeep(783.99, 0.22, 0.18, 'sine', now + 0.20);
      simpleBeep(1046.50, 0.30, 0.22, 'sine', now + 0.30);
    }).catch(function(err) {
      console.log(err);
    });
  }

  function playWrongSound() {
    if (!soundUnlocked || !audioCtx) return;

    audioCtx.resume().then(function() {
      var now = audioCtx.currentTime + 0.01;
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();

      osc.type = 'square';
      osc.frequency.setValueAtTime(180, now);
      osc.frequency.linearRampToValueAtTime(120, now + 0.25);

      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.28);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + 0.30);
    }).catch(function(err) {
      console.log(err);
    });
  }

  function newRound() {
    if (busy) return;
    answer = Math.floor(Math.random() * 5) + 1;
    choices = pickChoices(answer);
    document.getElementById('showNumber').textContent = answer;
    showPhase('look');
  }

  function goGuess() {
    if (busy) return;

    var container = document.getElementById('choicesContainer');
    container.innerHTML = '';

    choices.forEach(function(num) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'choice-btn';
      btn.innerHTML =
        '<span class="choice-number">' + num + '</span>' +
        '<span class="choice-text">👈 撳呢個</span>';

      btn.addEventListener('click', function() {
        checkAnswer(num);
      });

      container.appendChild(btn);
    });

    showPhase('guess');
  }

  function checkAnswer(num) {
    if (busy) return;
    busy = true;

    var resultText = document.getElementById('resultText');

    if (num === answer) {
      resultText.textContent = '✅ 答對了！好叻！';
      playCorrectSound();
    } else {
      resultText.textContent = '❌ 唔啱呀，再試吓！';
      playWrongSound();
    }

    showPhase('result');

    setTimeout(function() {
      busy = false;
    }, 300);
  }

  document.getElementById('soundBtn').addEventListener('click', unlockAndStart);
  document.getElementById('readyBtn').addEventListener('click', goGuess);
  document.getElementById('againBtn').addEventListener('click', newRound);

  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible' && audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume().catch(function(err) {
        console.log(err);
      });
    }
  });
</script>

</body>
</html>
