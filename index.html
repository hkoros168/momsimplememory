<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>記憶遊戲</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: Arial, sans-serif;
    background: #f3f4f6;
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: fixed;
    top: 0;
    left: 0;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .phase { display: none; flex-direction: column; align-items: center; width: 100%; padding: 24px; }
  .phase.active { display: flex; }
  .label {
    font-size: 2.5em;
    color: #374151;
    margin-bottom: 24px;
    text-align: center;
  }
  .big-number {
    font-size: 14em;
    font-weight: bold;
    margin-bottom: 40px;
    line-height: 1;
    color: #1e3a5f;
  }
  .big-icon {
    font-size: 8em;
    margin-bottom: 30px;
    line-height: 1;
  }

  .btn {
    border: none;
    border-radius: 20px;
    padding: 28px 50px;
    font-size: 1.8em;
    color: white;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    top: 0;
    transition: all 0.05s ease;
    text-shadow: 0 2px 2px rgba(0,0,0,0.2);
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active, .btn.pressed {
    top: 6px;
    box-shadow: none !important;
  }

  .btn-orange {
    background: linear-gradient(to bottom, #fb923c, #ea580c);
    box-shadow: 0 8px 0 #c2410c, 0 12px 16px rgba(0,0,0,0.2);
  }
  .btn-orange:active, .btn-orange.pressed {
    background: linear-gradient(to bottom, #ea580c, #c2410c);
    box-shadow: 0 2px 0 #9a3412;
  }

  .btn-blue {
    background: linear-gradient(to bottom, #60a5fa, #2563eb);
    box-shadow: 0 8px 0 #1d4ed8, 0 12px 16px rgba(0,0,0,0.2);
  }
  .btn-blue:active, .btn-blue.pressed {
    background: linear-gradient(to bottom, #3b82f6, #2563eb);
    box-shadow: 0 2px 0 #1d4ed8;
  }

  .btn-green {
    background: linear-gradient(to bottom, #4ade80, #16a34a);
    box-shadow: 0 8px 0 #15803d, 0 12px 16px rgba(0,0,0,0.2);
  }
  .btn-green:active, .btn-green.pressed {
    background: linear-gradient(to bottom, #22c55e, #16a34a);
    box-shadow: 0 2px 0 #15803d;
  }

  .btn span.sub {
    font-size: 0.65em;
    margin-top: 6px;
    opacity: 0.85;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    max-width: 420px;
  }
  .choice-btn {
    background: linear-gradient(to bottom, #ffffff, #e5e7eb);
    border: none;
    border-radius: 20px;
    padding: 28px 30px;
    display: flex;
    align-items: center;
    gap: 24px;
    cursor: pointer;
    font-size: 1em;
    position: relative;
    top: 0;
    box-shadow: 0 8px 0 #9ca3af, 0 12px 16px rgba(0,0,0,0.15);
    transition: all 0.05s ease;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .choice-btn:active, .choice-btn.pressed {
    top: 6px;
    box-shadow: 0 2px 0 #9ca3af;
    background: linear-gradient(to bottom, #e5e7eb, #d1d5db);
  }

  .choice-number {
    font-size: 5em;
    font-weight: bold;
    line-height: 1;
    color: #1e3a5f;
  }
  .choice-text {
    font-size: 1.6em;
    color: #6b7280;
    font-weight: bold;
  }

  .result-text {
    font-size: 3em;
    margin-bottom: 40px;
    text-align: center;
  }

  .sound-status {
    font-size: 1.3em;
    color: #6b7280;
    margin-top: 20px;
    text-align: center;
    min-height: 1.5em;
  }
</style>
</head>
<body>

<div id="start" class="phase active">
  <div class="big-icon">🔊</div>
  <p class="label">記憶數字遊戲</p>
  <button class="btn btn-orange" id="soundBtn">
    <span>👆 撳呢度開聲</span>
    <span class="sub">開咗聲先可以玩！</span>
  </button>
  <p id="soundStatus" class="sound-status"></p>
</div>

<div id="look" class="phase">
  <p class="label">睇吓呢個數字：</p>
  <div id="showNumber" class="big-number"></div>
  <button class="btn btn-blue" id="readyBtn">
    <span>👆 記住咗就撳呢度</span>
    <span class="sub">個數字會消失㗎！</span>
  </button>
</div>

<div id="guess" class="phase">
  <p class="label">請撳你見過嘅數字</p>
  <div id="choicesContainer" class="choices"></div>
</div>

<div id="result" class="phase">
  <p id="resultText" class="result-text"></p>
  <button class="btn btn-green" id="againBtn">
    <span>👆 撳呢度再玩</span>
    <span class="sub">會出新數字㗎！</span>
  </button>
</div>

<script>
  document.addEventListener('touchmove', function(e) {
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('scroll', function(e) {
    e.preventDefault();
  }, { passive: false });

  var answer = null;
  var choices = [];
  var audioCtx = null;
  var soundUnlocked = false;
  var isCheckingAnswer = false;

  function showPhase(id) {
    var phases = document.querySelectorAll('.phase');
    phases.forEach(function(p) {
      p.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var temp = a[i];
      a[i] = a[j];
      a[j] = temp;
    }
    return a;
  }

  function pickChoices(correct) {
    var all = [1, 2, 3, 4, 5];
    var others = all.filter(function(n) {
      return n !== correct;
    });
    var picked = shuffle(others).slice(0, 2);
    picked.push(correct);
    return shuffle(picked);
  }

  function ensureAudioReady() {
    if (!audioCtx) {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) {
        return Promise.reject(new Error('Web Audio not supported'));
      }
      audioCtx = new Ctx();
    }

    if (audioCtx.state === 'running') {
      return Promise.resolve();
    }

    return audioCtx.resume();
  }

  function unlockAndTestSound() {
    var status = document.getElementById('soundStatus');
    status.textContent = '開聲中...';

    ensureAudioReady().then(function() {
      var now = audioCtx.currentTime;

      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.linearRampToValueAtTime(0.18, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.23);

      var osc2 = audioCtx.createOscillator();
      var gain2 = audioCtx.createGain();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(1320, now + 0.06);
      gain2.gain.setValueAtTime(0.0001, now + 0.06);
      gain2.gain.linearRampToValueAtTime(0.12, now + 0.08);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.start(now + 0.06);
      osc2.stop(now + 0.29);

      soundUnlocked = true;
      status.textContent = '✅ 已開聲';

      setTimeout(function() {
        newRound();
      }, 350);
    }).catch(function(err) {
      console.log(err);
      soundUnlocked = false;
      status.textContent = '⚠️ 開聲失敗，請再撳一次';
    });
  }

  function playCheerfulChime() {
    if (!soundUnlocked) return;

    ensureAudioReady().then(function() {
      var now = audioCtx.currentTime;
      var notes = [523.25, 659.25, 783.99, 1046.50];
      var spacing = 0.09;

      for (var i = 0; i < notes.length; i++) {
        (function(idx) {
          var t = now + idx * spacing;

          var osc = audioCtx.createOscillator();
          var gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(notes[idx], t);
          gain.gain.setValueAtTime(0.0001, t);
          gain.gain.linearRampToValueAtTime(0.20, t + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(t);
          osc.stop(t + 0.33);

          var osc2 = audioCtx.createOscillator();
          var gain2 = audioCtx.createGain();
          osc2.type = 'triangle';
          osc2.frequency.setValueAtTime(notes[idx] * 2, t);
          gain2.gain.setValueAtTime(0.0001, t);
          gain2.gain.linearRampToValueAtTime(0.06, t + 0.02);
          gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
          osc2.connect(gain2);
          gain2.connect(audioCtx.destination);
          osc2.start(t);
          osc2.stop(t + 0.23);
        })(i);
      }
    }).catch(function(err) {
      console.log(err);
    });
  }

  function playWrongBuzz() {
    if (!soundUnlocked) return;

    ensureAudioReady().then(function() {
      var now = audioCtx.currentTime;

      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(180, now);
      osc.frequency.linearRampToValueAtTime(120, now + 0.25);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.31);
    }).catch(function(err) {
      console.log(err);
    });
  }

  function newRound() {
    isCheckingAnswer = false;
    answer = Math.floor(Math.random() * 5) + 1;
    choices = pickChoices(answer);
    document.getElementById('showNumber').textContent = answer;
    showPhase('look');
  }

  function goGuess() {
    var container = document.getElementById('choicesContainer');
    container.innerHTML = '';
    isCheckingAnswer = false;

    choices.forEach(function(num) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML =
        '<span class="choice-number">' + num + '</span>' +
        '<span class="choice-text">👈 撳呢個</span>';

      addFastTouch(btn, function() {
        checkAnswer(num);
      });

      container.appendChild(btn);
    });

    showPhase('guess');
  }

  function checkAnswer(num) {
    if (isCheckingAnswer) return;
    isCheckingAnswer = true;

    var resultText = document.getElementById('resultText');

    if (num === answer) {
      resultText.textContent = '✅ 答對了！好叻！';
      playCheerfulChime();
    } else {
      resultText.textContent = '❌ 唔啱呀，再試吓！';
      playWrongBuzz();
    }

    showPhase('result');
  }

  function addFastTouch(el, callback) {
    var touched = false;

    el.addEventListener('touchstart', function(e) {
      touched = true;
      e.preventDefault();
      el.classList.add('pressed');
      callback();
    }, { passive: false });

    el.addEventListener('touchend', function() {
      el.classList.remove('pressed');
      setTimeout(function() {
        touched = false;
      }, 400);
    });

    el.addEventListener('touchcancel', function() {
      el.classList.remove('pressed');
      setTimeout(function() {
        touched = false;
      }, 400);
    });

    el.addEventListener('click', function(e) {
      if (touched) {
        e.preventDefault();
        return;
      }
      callback();
    });
  }

  addFastTouch(document.getElementById('soundBtn'), unlockAndTestSound);
  addFastTouch(document.getElementById('readyBtn'), goGuess);
  addFastTouch(document.getElementById('againBtn'), newRound);

  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible' && audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume().catch(function(err) {
        console.log(err);
      });
    }
  });
</script>

</body>
</html>
